<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEP X API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b1a;
            color: #d0d0d0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(212, 255, 0, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(212, 255, 0, 0.06);
            padding-bottom: 16px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4ff00, #a0cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-weight: 300;
            -webkit-text-fill-color: #6b7280;
            font-size: 16px;
        }

        .status-badge {
            margin-left: auto;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .status-badge.online {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .status-badge.offline {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .status-badge.testing {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0b0b1a;
            border: 1px solid rgba(212, 255, 0, 0.06);
            border-radius: 8px;
            color: #d0d0d0;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #d4ff00;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-size: 13px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #d4ff00;
            color: #0b0b1a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 255, 0, 0.15);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.15);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #0b0b1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spinner-white {
            border-color: rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .response-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 8px;
            background: #0b0b1a;
            border: 1px solid rgba(212, 255, 0, 0.06);
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .response-box.show {
            display: block;
        }

        .response-box .timestamp {
            color: #6b7280;
            font-size: 11px;
            margin-bottom: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .response-box .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .response-box .status-line .code {
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .response-box .status-line .code.ok {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        .response-box .status-line .code.err {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
        }

        .response-box .json-output {
            color: #d0d0d0;
        }

        .response-box .json-output .key {
            color: #60a5fa;
        }

        .response-box .json-output .string {
            color: #34d399;
        }

        .response-box .json-output .number {
            color: #fbbf24;
        }

        .response-box .json-output .boolean {
            color: #f472b6;
        }

        .response-box .json-output .null {
            color: #6b7280;
        }

        .quick-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quick-presets button {
            padding: 4px 12px;
            border: 1px solid rgba(212, 255, 0, 0.06);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            color: #9ca3af;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .quick-presets button:hover {
            border-color: rgba(212, 255, 0, 0.15);
            color: #d4ff00;
        }

        .help-text {
            color: #6b7280;
            font-size: 12px;
            margin-top: 8px;
        }

        .help-text code {
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #d4ff00;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 255, 0, 0.15);
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚡ SEP <span>X</span></div>
            <span class="status-badge offline" id="statusBadge">● OFFLINE</span>
        </div>

        <!-- Configuration -->
        <div class="form-group">
            <label for="apiKeyInput">🔑 API Key</label>
            <input type="text" id="apiKeyInput" value="4Ga_zAV8gal0_fOi6kdtT9GwGd_otEoV34I3qn3L9pw" />
        </div>

        <div class="form-group">
            <label for="urlInput">🌐 Endpoint</label>
            <input type="text" id="urlInput" value="https://sep-x.onrender.com/v1/chat/completions" />
        </div>

        <!-- Quick Presets -->
        <div class="quick-presets">
            <button onclick="setPrompt('Hello! Say hello back in one word.')">Simple Hello</button>
            <button onclick="setPrompt('What is the capital of France?')">Trivia</button>
            <button onclick="setPrompt('Explain quantum computing in simple terms.')">Science</button>
            <button onclick="setPrompt('Write a haiku about coding.')">Creative</button>
        </div>

        <!-- Prompt -->
        <div class="form-group">
            <label for="promptInput">💬 Message</label>
            <textarea id="promptInput" placeholder="Type your message here...">Hello! Say hello back in one word.</textarea>
        </div>

        <!-- Model -->
        <div class="form-group">
            <label for="modelInput">🧠 Model</label>
            <input type="text" id="modelInput" value="deepseek-chat" />
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button class="btn btn-primary" id="testBtn" onclick="testAPI()">
                🚀 Send Request
            </button>
            <button class="btn btn-secondary" onclick="clearResponse()">
                🗑️ Clear
            </button>
            <button class="btn btn-secondary" onclick="checkHealth()">
                💚 Health Check
            </button>
        </div>

        <!-- Help Text -->
        <div class="help-text">
            💡 Tip: You can change the API key, endpoint, model, or message above.
            <br>Rate limit: <code>30 requests/hour</code>
        </div>

        <!-- Response -->
        <div class="response-box" id="responseBox">
            <div class="timestamp" id="timestamp"></div>
            <div class="status-line">
                <span class="code" id="statusCode">200 OK</span>
                <span id="statusTime" style="color:#6b7280;font-size:12px;"></span>
            </div>
            <div class="json-output" id="jsonOutput"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const CONFIG = {
            defaultApiKey: '4Ga_zAV8gal0_fOi6kdtT9GwGd_otEoV34I3qn3L9pw',
            defaultUrl: 'https://sep-x.onrender.com/v1/chat/completions',
            healthUrl: 'https://sep-x.onrender.com/health'
        };

        // ============================================================
        // DOM REFS
        // ============================================================
        const $ = id => document.getElementById(id);
        const apiKeyInput = $('apiKeyInput');
        const urlInput = $('urlInput');
        const promptInput = $('promptInput');
        const modelInput = $('modelInput');
        const testBtn = $('testBtn');
        const statusBadge = $('statusBadge');
        const responseBox = $('responseBox');
        const timestampEl = $('timestamp');
        const statusCodeEl = $('statusCode');
        const statusTimeEl = $('statusTime');
        const jsonOutput = $('jsonOutput');

        // ============================================================
        // SET PROMPT (Quick Presets)
        // ============================================================
        function setPrompt(text) {
            promptInput.value = text;
        }

        // ============================================================
        // HEALTH CHECK
        // ============================================================
        async function checkHealth() {
            setStatus('testing', 'TESTING...');
            showResponse('⏳ Checking backend health...');

            try {
                const response = await fetch(CONFIG.healthUrl);
                const data = await response.json();

                if (response.ok) {
                    setStatus('online', '● ONLINE');
                    showResponse(`
✅ Backend is healthy!

${formatJSON(data)}
                    `);
                } else {
                    setStatus('offline', '● OFFLINE');
                    showResponse(`
❌ Backend returned: ${response.status}

${formatJSON(data)}
                    `);
                }
            } catch (error) {
                setStatus('offline', '● OFFLINE');
                showResponse(`
❌ Connection failed: ${error.message}

Make sure:
1. You have internet connection
2. The backend is running
3. The URL is correct
                `);
            }
        }

        // ============================================================
        // TEST API
        // ============================================================
        async function testAPI() {
            const apiKey = apiKeyInput.value.trim();
            const url = urlInput.value.trim();
            const prompt = promptInput.value.trim();
            const model = modelInput.value.trim() || 'deepseek-chat';

            // Validation
            if (!apiKey) {
                showResponse('❌ Please enter an API key.');
                return;
            }

            if (!url) {
                showResponse('❌ Please enter the endpoint URL.');
                return;
            }

            if (!prompt) {
                showResponse('❌ Please enter a message.');
                return;
            }

            // Disable button during request
            testBtn.disabled = true;
            testBtn.innerHTML = '<span class="spinner spinner-white"></span> SENDING...';
            setStatus('testing', '● TESTING...');

            const startTime = Date.now();

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                        model: model
                    })
                });

                const data = await response.json();
                const endTime = Date.now();
                const duration = (endTime - startTime) / 1000;

                // Set status
                if (response.ok) {
                    setStatus('online', '● ONLINE');
                } else {
                    setStatus('offline', '● OFFLINE');
                }

                // Display response
                displayResponse(response.status, duration, data);

            } catch (error) {
                setStatus('offline', '● OFFLINE');
                showResponse(`
❌ Request failed: ${error.message}

Possible issues:
1. Check your internet connection
2. Verify the endpoint URL is correct
3. Make sure the API key is valid
4. Check if the backend is running

Full error: ${error.stack || error.message}
                `);
            }

            // Re-enable button
            testBtn.disabled = false;
            testBtn.innerHTML = '🚀 Send Request';
        }

        // ============================================================
        // DISPLAY RESPONSE
        // ============================================================
        function displayResponse(statusCode, duration, data) {
            const timestamp = new Date().toLocaleString();
            const statusClass = statusCode >= 200 && statusCode < 300 ? 'ok' : 'err';

            let output = '';

            // Extract the actual response content if available
            if (data && data.choices && data.choices.length > 0) {
                const message = data.choices[0].message.content;
                output += `💬 Response: "${message}"\n\n`;
            }

            // Format full response
            output += `📦 Full Response:\n${formatJSON(data)}`;

            showResponse(output);

            // Update status elements
            timestampEl.textContent = `📅 ${timestamp}`;
            statusCodeEl.textContent = `${statusCode}`;
            statusCodeEl.className = `code ${statusClass}`;
            statusTimeEl.textContent = `⏱️ ${duration.toFixed(2)}s`;
        }

        // ============================================================
        // SHOW RESPONSE
        // ============================================================
        function showResponse(content) {
            jsonOutput.textContent = content;
            responseBox.className = 'response-box show';
        }

        function clearResponse() {
            responseBox.className = 'response-box';
            jsonOutput.textContent = '';
            timestampEl.textContent = '';
            statusCodeEl.textContent = '';
            statusCodeEl.className = 'code';
            statusTimeEl.textContent = '';
            setStatus('offline', '● OFFLINE');
        }

        // ============================================================
        // SET STATUS
        // ============================================================
        function setStatus(type, text) {
            statusBadge.className = `status-badge ${type}`;
            statusBadge.textContent = text;
        }

        // ============================================================
        // FORMAT JSON
        // ============================================================
        function formatJSON(data) {
            return JSON.stringify(data, null, 2);
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            // Ctrl+Enter or Cmd+Enter to send
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                testAPI();
            }
        });

        // ============================================================
        // AUTO HEALTH CHECK ON LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            // Check health after 1 second
            setTimeout(checkHealth, 1000);
        });
    </script>

</body>
</html>
